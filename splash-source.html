<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grill Master Splash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,500;0,600;1,500;1,600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0f0a06; }
  .splash {
    width: 2732px;
    height: 2732px;
    background: #0f0a06;
    background-image: radial-gradient(ellipse at center, #1a120a 0%, #0f0a06 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    font-family: "Newsreader", "Iowan Old Style", Georgia, serif;
  }
  .wordmark {
    display: flex;
    align-items: center;
    gap: 60px;
  }
  .rule {
    width: 16px;
    height: 280px;
    background: #d4661a;
  }
  .name {
    font-family: "Newsreader", "Iowan Old Style", Georgia, serif;
    font-size: 220px;
    color: #f5e4c8;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .name em {
    font-style: italic;
    color: #d4661a;
    font-weight: 500;
  }
  .footer {
    position: absolute;
    bottom: 200px;
    font-family: "Courier Prime", "Courier New", monospace;
    font-size: 36px;
    letter-spacing: 24px;
    text-transform: uppercase;
    color: #5c4a32;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="splash">
  <div class="wordmark">
    <div class="rule"></div>
    <div class="name">Grill <em>Master</em></div>
  </div>
  <div class="footer">Pitmaster's Notebook</div>
</div>
</body>
</html>
